<head>

    <style>
        body {
            display: grid;
            grid: 500px / auto auto;
        }

        #pinpin {
            grid-area: 1/1/span 2/2;
            width: 1100px;
            position: relative;
            top: 0;
            left: 0;
        }

        #hat {
            grid-area: 0/1/2/2;
            width: 650px; /*650*/
            height: 650px;
            position: absolute;
            bottom: -46px;
            left: 307px;
            border: 1px solid red;
        }

            #hat:hover {
                /*animation-name: myAnimation;
            animation-duration: 2s;*/
            }

        /*@keyframes myAnimation {
            0% {
                bottom: -46px;
                left: 307px;
            }
            50% {
                left: 200px;
                top: 200px;
            }
            100% {
                left: 0px;
                top: 0px;
            }
        }*/

        #text {
            grid-area: 1/2/2/3; /*look how to distiguish the two divs*/
        }

        #meow {
            position: relative;
        }
    </style>
</head>
<body bgcolor="#99ccff">
	<div id="text">
		<br>
		<h2>Try pointing at the cute pinguin :)</h2>
	</div>

    <div id="meow">
        <img id="pinpin" src="pinguin free.png" />
        <img id="hat" src="hat.png" onmouseover="dark()" onmouseout="normal()" onclick="hi()"/>
    </div>
        
	


    <script>
        function dark() {
            document.getElementById("pinpin").style.opacity="0.2";
            document.getElementById("hat").style.opacity = "1";
            document.getElementById("text").style.opacity = "0.2";
            document.getElementById("click").style.opacity = "0.2";
        }
        function normal() {
            document.getElementById("pinpin").style.opacity = "1";
            document.getElementById("hat").style.opacity = "1";
            document.getElementById("text").style.opacity = "1";
            document.getElementById("click").style.opacity = "1";
        }
        function hi() {
            const para = document.createElement("p");
            const node = document.createTextNode("This is new.");
            para.appendChild(node);
            const element = document.getElementById("meow");
            element.appendChild(para);
        }
    </script>
</body>
</html>
