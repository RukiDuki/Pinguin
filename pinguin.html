<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
    <title>hehe</title>
    <!-- https://stackoverflow.com/questions/48474/how-do-i-position-one-image-on-top-of-another-in-html
        https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/At-rules/@function
        https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Values/color_value -->
    <style>
        body {
            display: grid;
            grid: 500px / auto auto;
        }

        #pinpin {
            grid-area: 1/1/span 2/2;
            width: 1100px;
            position: relative;
            top: 0;
            left: 0;
        }

        #hat {
            grid-area: 0/1/2/2;
            width: 650px; /*650*/
            height: 650px;
            position: absolute;
            top: -104px;
            left: 307px;
        }

        img#hat:hover {
        }

        /*@keyframes myAnimation { WTF?!?!? Help!!
            0% {
                left: 0px;
                top: 0px;
            }
            50% {
                left: 200px;
                top: 200px;
            }
            100% {
                left: 0px;
                top: 0px;
            }
        }*/

        #text {
            grid-area: 1/2/2/3;
            background-color: crimson; /*look how to distiguish the two divs*/
        }

        #meow {
            position: relative;
        }
    </style>
</head>
<body bgcolor="#99ccff">
	<div id="text">
		<br>
		<h2>Try pointing at the cute pinguin :)</h2>
	</div>

    <div id="meow">
        <img id="pinpin" src="pinpin.jpg" />
        <img id="hat" src="hat.png" />
    </div>
    <button onclick="dark()" >Click me><</button>
        
	


    <script>
        function dark(){
            document.body.style.backgroundColor = "black";
        }
    </script>
</body>
</html>
